name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify release hygiene
        env:
          CODEX_LB_API_KEY: ""
          GROQ_API_KEY: ""
          CUSTOM_OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          GEMINI_API_KEY: ""
          DEEPSEEK_API_KEY: ""
          OPENROUTER_API_KEY: ""
        run: python scripts/verify_release.py

      - name: Bootstrap demo workspace
        run: python scripts/bootstrap_demo.py --reset

      - name: Import web app
        run: python -c "import web.server; print('web app import ok')"
