name: Bug report
description: Report a reproducible WHITE ROOM bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact local steps, commands, route, and browser URL if relevant.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, local runner/provider, and install method.
    validations:
      required: false
  - type: checkboxes
    id: hygiene
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys, local private paths, account screenshots, and private project memory from this report.
          required: true
