<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">WHITE ROOM local trust boundary</title>
  <desc id="desc">A diagram showing local project memory, local secrets, SQLite, routing, approvals, adapters, local model runners, manual sessions, and gated cloud APIs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#131827"/>
    </linearGradient>
    <linearGradient id="local" x1="0" x2="1">
      <stop offset="0" stop-color="#18233c"/>
      <stop offset="1" stop-color="#122c37"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" x2="1">
      <stop offset="0" stop-color="#2f1735"/>
      <stop offset="1" stop-color="#342128"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { fill: #f7fbff; font: 700 40px Segoe UI, Arial, sans-serif; }
      .label { fill: #f7fbff; font: 700 24px Segoe UI, Arial, sans-serif; }
      .small { fill: #b7c2d8; font: 18px Segoe UI, Arial, sans-serif; }
      .tiny { fill: #98a6c0; font: 15px Segoe UI, Arial, sans-serif; }
      .box { stroke: #4c5c83; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .safe { stroke: #5de1d7; }
      .warn { stroke: #ff8ec7; }
      .line { stroke: #6d7897; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .gate { stroke: #ffd36b; stroke-width: 3; fill: #2f2a19; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d7897"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="54" y="70" class="title">WHITE ROOM Security Boundary</text>
  <text x="54" y="104" class="small">Local memory and secrets stay inside the operator-controlled boundary. Cloud lanes receive only scoped packets after policy and approval checks.</text>
  <rect x="46" y="138" width="812" height="528" rx="30" fill="none" stroke="#5de1d7" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="76" y="178" class="label">Local Trust Boundary</text>
  <text x="76" y="205" class="small">127.0.0.1 app, ignored runtime state, local operator control</text>
  <rect x="88" y="250" width="210" height="110" class="box safe" fill="url(#local)"/>
  <text x="112" y="292" class="label">Project Memory</text>
  <text x="112" y="322" class="small">brain files, tasks,</text>
  <text x="112" y="348" class="small">handoffs, decisions</text>
  <rect x="88" y="412" width="210" height="110" class="box safe" fill="url(#local)"/>
  <text x="112" y="454" class="label">Local Secrets</text>
  <text x="112" y="484" class="small">env, .env,</text>
  <text x="112" y="510" class="small">secrets.local.json</text>
  <rect x="374" y="250" width="210" height="110" class="box safe" fill="url(#local)"/>
  <text x="398" y="292" class="label">SQLite Runtime</text>
  <text x="398" y="322" class="small">route rows, usage,</text>
  <text x="398" y="348" class="small">health, approvals</text>
  <rect x="374" y="412" width="210" height="110" class="box safe" fill="url(#local)"/>
  <text x="398" y="454" class="label">Router</text>
  <text x="398" y="484" class="small">cost, risk, mode,</text>
  <text x="398" y="510" class="small">capability checks</text>
  <rect x="646" y="250" width="170" height="110" class="gate" rx="18"/>
  <text x="676" y="292" class="label">Approval</text>
  <text x="676" y="322" class="small">explicit gates</text>
  <text x="676" y="348" class="small">trust windows</text>
  <rect x="646" y="412" width="170" height="110" class="box safe" fill="url(#local)"/>
  <text x="676" y="454" class="label">Adapters</text>
  <text x="676" y="484" class="small">normalize calls,</text>
  <text x="676" y="510" class="small">redact errors</text>
  <path class="line" d="M298 305 H374"/>
  <path class="line" d="M298 467 H374"/>
  <path class="line" d="M584 467 H646"/>
  <path class="line" d="M731 412 V360"/>
  <path class="line" d="M584 305 H646"/>
  <rect x="930" y="202" width="260" height="112" class="box safe" fill="#102a34"/>
  <text x="960" y="246" class="label">Local Models</text>
  <text x="960" y="278" class="small">Ollama / LM Studio</text>
  <text x="960" y="304" class="tiny">No cloud hop required</text>
  <rect x="930" y="368" width="260" height="112" class="box" fill="#1b2032"/>
  <text x="960" y="412" class="label">Manual Sessions</text>
  <text x="960" y="444" class="small">Copy/paste packets</text>
  <text x="960" y="470" class="tiny">Human controlled boundary</text>
  <rect x="930" y="534" width="260" height="112" class="box warn" fill="url(#cloud)"/>
  <text x="960" y="578" class="label">Cloud APIs</text>
  <text x="960" y="610" class="small">Groq / gateways / APIs</text>
  <text x="960" y="636" class="tiny">Scoped packet only after approval</text>
  <path class="line" d="M816 448 C872 448 872 258 930 258"/>
  <path class="line" d="M816 467 H930"/>
  <path class="line" d="M816 500 C872 500 872 590 930 590"/>
  <text x="74" y="628" class="tiny">Security claim: reduced exposure by design, not absolute immunity. Deployment review is required before binding beyond localhost.</text>
</svg>
